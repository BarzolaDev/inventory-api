services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    environment:
      - DATABASES_HOST=db
      - DATABASES_PORT=5432
      - DATABASES_USER=user
      - DATABASES_PASSWORD=password
      - DATABASES_DBNAME=dbname
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
    depends_on:
      - db
  redis:
    image: redis:7-alpine
  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      - BACKEND=http://api:8000
      - PORT=8080
      - SSL_PORT=8443
      - MODSEC_RULE_ENGINE=On
    depends_on:
      - api
  api:
    build: .
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
      - pgbouncer
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --no-server-header
volumes:
  postgres_data:
