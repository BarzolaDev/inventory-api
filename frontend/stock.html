<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mover stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="text-sm text-blue-600 hover:text-blue-800 font-medium">← Volver</a>
    <h1 class="text-lg font-bold text-gray-800">Mover stock</h1>
    <button id="logoutBtn" class="text-sm text-red-500 hover:text-red-700 font-medium">Cerrar sesión</button>
  </nav>

  <main class="max-w-lg mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-md p-8 space-y-6">

      <!-- Info del producto -->
      <div id="productInfo" class="hidden bg-gray-50 rounded-lg px-4 py-3">
        <p class="text-sm text-gray-500">Producto</p>
        <p id="productName" class="font-semibold text-gray-800"></p>
        <p class="text-sm text-gray-500 mt-1">Stock actual: <span id="productStock" class="font-semibold text-gray-800"></span></p>
      </div>

      <form id="stockForm" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Producto</label>
          <select id="productSelect" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Seleccioná un producto</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Tipo de movimiento</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="flex items-center gap-2 border rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-50">
              <input type="radio" name="type" value="ingreso" checked class="accent-blue-600" />
              <span class="text-sm font-medium text-green-700">Ingreso</span>
            </label>
            <label class="flex items-center gap-2 border rounded-lg px-3 py-2 cursor-pointer hover:bg-gray-50">
              <input type="radio" name="type" value="retiro" class="accent-blue-600" />
              <span class="text-sm font-medium text-red-600">Retiro</span>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cantidad</label>
          <input id="quantity" type="number" min="1" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>

        <button type="submit" id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2 text-sm transition-colors">
          Confirmar movimiento
        </button>

      </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/stock.js"></script>

</body>
</html>
