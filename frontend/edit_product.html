<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar producto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
    <a id="backBtn" href="index.html" class="text-sm text-blue-600 hover:text-blue-800 font-medium">← Volver</a>
    <h1 class="text-lg font-bold text-gray-800">Editar producto</h1>
    <button id="logoutBtn" class="text-sm text-red-500 hover:text-red-700 font-medium">Cerrar sesión</button>
  </nav>

  <main class="max-w-lg mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-md p-8">

      <form id="editForm" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input id="name" type="text"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Unidad</label>
          <input id="unit" type="text"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Precio compra</label>
            <input id="purchase_price" type="number" step="0.01" min="0"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Precio venta</label>
            <input id="sale_price" type="number" step="0.01" min="0"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>

        <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>

        <button type="submit" id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2 text-sm transition-colors">
          Guardar cambios
        </button>

      </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    if (!productId) window.location.href = 'index.html';

    document.getElementById('backBtn').href = `product.html?id=${productId}`;

    // Cargar datos actuales del producto
    async function loadProduct() {
      try {
        const res = await apiFetch(`/products/${productId}`);
        if (!res.ok) throw new Error('Producto no encontrado');
        const p = await res.json();

        document.getElementById('name').value = p.name;
        document.getElementById('unit').value = p.unit;
        document.getElementById('purchase_price').value = p.purchase_price;
        document.getElementById('sale_price').value = p.sale_price;

      } catch (err) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
      }
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');
      errorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Guardando...';

      // Solo manda los campos que tienen valor
      const body = {};
      const name = document.getElementById('name').value;
      const unit = document.getElementById('unit').value;
      const purchase_price = document.getElementById('purchase_price').value;
      const sale_price = document.getElementById('sale_price').value;

      if (name) body.name = name;
      if (unit) body.unit = unit;
      if (purchase_price) body.purchase_price = parseFloat(purchase_price);
      if (sale_price) body.sale_price = parseFloat(sale_price);

      try {
        const res = await apiFetch(`/products/${productId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Error al actualizar el producto');
        }

        window.location.href = `product.html?id=${productId}`;

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Guardar cambios';
      }
    });

    loadProduct();
  </script>

</body>
</html>
